<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Dashboard</title>
    <link rel="stylesheet" href="lab6.2.css">
</head>

<body>
    <div class="dashboard">
        <header class="header">
            <h1>แดชบอร์ดระบบ</h1>
            <nav>
                <button>โปรไฟล์</button>
                <button>ออกจากระบบ</button>
            </nav>
        </header>

        <aside class="sidebar">
            <h2>Admin Panel</h2>
            <nav>
                <ul>
                    <li>🏠 หน้าแรก</li>
                    <li>📊 รายงาน</li>
                    <li>⚙️ การตั้งค่า</li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <div class="stats-grid">
                <div class="stat-card" style="border-left-color: #3b82f6;">
                    <h3>ยอดขายรวม</h3>
                    <p>฿150,000</p>
                </div>
                <div class="stat-card" style="border-left-color: #10b981;">
                    <h3>จำนวนออเดอร์</h3>
                    <p>1,234</p>
                </div>
                <div class="stat-card" style="border-left-color: #f59e0b;">
                    <h3>ลูกค้าใหม่</h3>
                    <p>45</p>
                </div>
            </div>

            <div class="chart-container">
                <div class="chart">
                    <h3>📈 กราฟแสดงยอดขาย</h3>
                    <div style="margin-top:20px; color:#94a3b8; text-align:center;">[ พื้นที่แสดงกราฟเส้น ]</div>
                </div>
                <div class="chart">
                    <h3>🍰 สัดส่วนสินค้า</h3>
                    <div style="margin-top:20px; color:#94a3b8; text-align:center;">[ พื้นที่แสดงกราฟวงกลม ]</div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
