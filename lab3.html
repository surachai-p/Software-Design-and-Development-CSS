<!DOCTYPE html>
<html>
<head>
    <title>Product Card</title>
    <link rel="stylesheet" href="lab3.css">
</head>
<body>

    <div class="product-container">

        <div class="product-card">
            <img src="images/product1.jpg" class="product-image">
            <div class="product-info">
                <h2 class="product-title">สินค้า A</h2>
                <p class="product-price">฿890</p>
                <p class="product-description">
                    หอมละมุน รสชาติดี
                </p>
                <a href="#" class="product-button">เพิ่มลงตะกร้า</a>
            </div>
        </div>

        <div class="product-card">
            <img src="images/product2.jpg" class="product-image">
            <div class="product-info">
                <h2 class="product-title">สินค้า B</h2>
                <p class="product-price">฿700</p>
                <p class="product-description">
                    หอมสดชื่น โทนถั่ว
                </p>
                <a href="#" class="product-button">เพิ่มลงตะกร้า</a>
            </div>
        </div>

        <div class="product-card">
            <img src="images/product3.jpg" class="product-image">
            <div class="product-info">
                <h2 class="product-title">สินค้า C</h2>
                <p class="product-price">฿899</p>
                <p class="product-description">
                    นุ่มละมุนลิ้น
                </p>
                <a href="#" class="product-button">เพิ่มลงตะกร้า</a>
            </div>
        </div>

        <div class="product-card">
            <img src="images/product4.jpg" class="product-image">
            <div class="product-info">
                <h2 class="product-title">สินค้า D</h2>
                <p class="product-price">฿690</p>
                <p class="product-description">
                    สินค้าคุณภาพดี
                </p>
                <a href="#" class="product-button">เพิ่มลงตะกร้า</a>
            </div>
        </div>

    </div>

</body>
</html>
