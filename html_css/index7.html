<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style7.css">
</head>
<body>

<div class="dashboard">

    <!-- HEADER -->
    <header class="header">
        <h1>Dashboard</h1>
        <nav>
            <button class="btn btn-light btn-sm">Profile</button>
            <button class="btn btn-danger btn-sm">Log Out</button>
        </nav>
    </header>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <ul>
            <li>Home</li>
            <li>Report</li>
            <li>Setting</li>
        </ul>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

        <!-- STAT CARDS -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>ยอดขายรวม</h3>
                <p>฿150,000</p>
            </div>
            <div class="stat-card">
                <h3>Orders</h3>
                <p>1,234</p>
            </div>
            <div class="stat-card">
                <h3>New-Cus</h3>
                <p>45</p>
            </div>
        </div>

        <!-- CHARTS -->
        <div class="chart-container">
            <div class="chart">
                <h3>กราฟแสดงยอดขาย</h3>
                <canvas id="salesChart"></canvas>
            </div>

            <div class="chart">
                <h3>สัดส่วนสินค้าขายดี</h3>
                <canvas id="productChart"></canvas>
            </div>
        </div>

    </main>

</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    // กราฟเส้น (ยอดขายรายเดือน)
    const ctx1 = document.getElementById('salesChart').getContext('2d');
    new Chart(ctx1, {
        type: 'line',
        data: {
            labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
            datasets: [{
                label: 'ยอดขาย (บาท)',
                data: [12000, 19000, 15000, 22000, 18000, 25000],
                borderColor: '#0d6efd',
                backgroundColor: 'rgba(13,110,253,0.2)',
                tension: 0.4,
                fill: true
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    labels: { color: '#333' }
                }
            }
        }
    });

    // กราฟวงกลม (สินค้าขายดี)
    const ctx2 = document.getElementById('productChart').getContext('2d');
    new Chart(ctx2, {
        type: 'pie',
        data: {
            labels: ['PS2', 'PS3', 'PS4', 'PS5'],
            datasets: [{
                data: [40, 20, 45, 40],
                backgroundColor: [
                    '#0d6efd',
                    '#198754',
                    '#ffc107',
                    '#dc3545'
                ]
            }]
        },
        options: {
            responsive: true
        }
    });
</script>

</body>
</html>
